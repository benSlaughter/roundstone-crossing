# Roundstone Level Crossing — Configuration
# All berth IDs and timing parameters are configurable for recalibration.

crossing:
  name: "Roundstone Level Crossing"
  network_rail_id: 1958
  location:
    lat: 50.816519
    lon: -0.476006
  road: "B2140 Roundstone Lane"
  type: "MCB-CCTV"

# Railway context
railway:
  line: "West Coastway"
  elr: "BLI1"
  line_speed_mph: 70
  stations:
    west:
      name: "Angmering"
      crs: "ANG"
      tiploc: "ANGMRNG"
      stanox: "87998"
    east:
      name: "Goring-by-Sea"
      crs: "GBS"
      tiploc: "GORNGBS"
      stanox: "87997"

# Train Describer configuration
# TD area: LA (covers Brighton–Littlehampton coastway, confirmed from SMART data)
td:
  area_id: "LA"

  # Berth zones — trains stepping into these berths trigger state changes.
  # Direction: "up" = towards London/Brighton (eastbound), "down" = towards Portsmouth (westbound)
  #
  # Crossing location (verified from OpenTrainTimes SVG signalling diagram):
  #   Eastbound: just after signal 38, at the start of berth 0036
  #   Westbound: just after signal 39, at the start of berth 0041
  #   Berth 0041 is long — it covers both the crossing AND Angmering P2 platform.
  #
  approach_berths:
    up: ["A027"]                        # Beyond Angmering west (heading east towards crossing)
    down: ["0033"]                      # Far east of Goring (heading west towards crossing)

  strike_in_berths:
    up: ["0040", "0038"]                # Angmering P1 arrival + departure (heading east)
    down: ["0035", "0037", "0039"]      # Goring P2 through to approaching crossing

  at_crossing_berths:
    up: ["0036"]                        # Just past signal 38 — crossing at start of this berth
    down: ["0041"]                      # Just past signal 39 — crossing at start of this berth

  clear_berths:
    up: ["0034"]                        # Past crossing, approaching Goring P1
    down: ["A027"]                      # Past crossing + Angmering P2, departed westward

# Timing model — initial heuristics, refined by observed data
timing:
  # How long before the train arrives at the crossing do barriers typically lower?
  # MCB-CCTV standard: signaller lowers ~120s before, but varies with practice.
  pre_closure_secs: 120    # Initial estimate, will be calibrated
  
  # How long after the train clears does it take for barriers to raise?
  # Observed 2026-04-28: ~5-8s after last train to barriers rising
  post_clearance_secs: 8

  # How long it takes a train to physically clear the crossing zone
  # At 70mph a 200m train clears in ~6s; allow margin for slower trains
  crossing_clearance_secs: 10

  # Minimum warning time per regulations (GK/RT0192)
  min_warning_secs: 27

  # If no TD/TRUST data for this long, mark state as STALE
  stale_threshold_secs: 300

# TRUST timing points near the crossing (for fallback when TD unavailable)
trust:
  timing_points:
    # Departure events — used for crossing time estimation
    - tiploc: "ANGMRNG"
      stanox: "87998"
      direction: "up"
      event: "departure"
      action: "predict"
      offset_secs: 90     # ~90s from Angmering departure to crossing (eastbound)
    - tiploc: "GORNGBS"
      stanox: "87997"
      direction: "down"
      event: "departure"
      action: "predict"
      offset_secs: 120    # ~120s from Goring departure to crossing (westbound)

    # Arrival events — used to show trains at stations
    - tiploc: "ANGMRNG"
      stanox: "87998"
      direction: "up"
      event: "arrival"
      action: "at_station"
      station: "Angmering"
    - tiploc: "ANGMRNG"
      stanox: "87998"
      direction: "down"
      event: "arrival"
      action: "clear"       # Westbound arrival at Angmering P2 = past the crossing
      station: "Angmering"
    - tiploc: "GORNGBS"
      stanox: "87997"
      direction: "up"
      event: "arrival"
      action: "clear"            # Eastbound arrival at Goring = past the crossing
      station: "Goring"
    - tiploc: "GORNGBS"
      stanox: "87997"
      direction: "down"
      event: "arrival"
      action: "at_station"
      station: "Goring"

# Station berths — berths that straddle a station platform
# Each maps to a station name + sub-positions (% from left on diagram)
station_berths:
  "0038":
    station: "Angmering"
    direction: "up"
    entry: 8       # west side (train enters from west)
    platform: 17   # at station
  "0041":
    station: "Angmering"
    direction: "down"
    entry: 25      # east side (train enters from crossing)
    platform: 17   # at station
  "0032":
    station: "Goring"
    direction: "up"
    entry: 75      # west side (train enters from west)
    platform: 83   # at station
  "0035":
    station: "Goring"
    direction: "down"
    entry: 93      # east side (train enters from east)
    platform: 83   # at station

# Realtime Trains API — platform-level station data
rtt:
  stations: ["ANG", "GBS"]    # CRS codes to poll (ANG=Angmering, GBS=Goring-by-Sea)
  poll_interval: 15            # seconds between poll cycles

# API server
api:
  host: "127.0.0.1"    # Use 0.0.0.0 for LAN access
  port: 8590
