# Roundstone Level Crossing — Configuration
# All berth IDs and timing parameters are configurable for recalibration.

crossing:
  name: "Roundstone Level Crossing"
  network_rail_id: 1958
  location:
    lat: 50.816519
    lon: -0.476006
  road: "B2140 Roundstone Lane"
  type: "MCB-CCTV"

# Railway context
railway:
  line: "West Coastway"
  elr: "BLI1"
  line_speed_mph: 70
  stations:
    west:
      name: "Angmering"
      crs: "ANG"
      tiploc: "ANGMRNG"
      stanox: "87998"
    east:
      name: "Goring-by-Sea"
      crs: "GBS"
      tiploc: "GORNGBS"
      stanox: "87997"

# Train Describer configuration
# TD area: LA (covers Brighton–Littlehampton coastway, confirmed from SMART data)
td:
  area_id: "LA"

  # Berth zones — trains stepping into these berths trigger state changes.
  # Direction: "up" = towards London/Brighton (eastbound), "down" = towards Portsmouth (westbound)
  #
  # Crossing location (verified from OpenTrainTimes SVG signalling diagram):
  #   Eastbound: just after signal 38, at the start of berth 0036
  #   Westbound: just after signal 39, at the start of berth 0041
  #   Berth 0041 is long — it covers both the crossing AND Angmering P2 platform.
  #
  approach_berths:
    up: ["0042"]                        # West of Angmering P1 (heading east towards crossing)
    down: ["0033"]                      # Far east of Goring (heading west towards crossing)

  strike_in_berths:
    up: ["0040", "0038"]                # Angmering P1 arrival + departure (heading east)
    down: ["0035", "0037", "0039"]      # Goring P2 through to approaching crossing

  at_crossing_berths:
    up: ["0036"]                        # Just past signal 38 — crossing at start of this berth
    down: ["0041"]                      # Just past signal 39 — crossing at start of this berth

  clear_berths:
    up: ["0034"]                        # Past crossing, approaching Goring P1
    down: ["A027"]                      # Past Angmering P2, departed westward (down line only)

# Timing model — initial heuristics, refined by observed data
timing:
  # How early before a train arrives at the crossing do we believe barriers may be lowering?
  # Used by inferrer to transition an APPROACHING train to CLOSING_PREDICTED, and to
  # compute the "predicted barriers close at" timestamp for the dashboard.
  #
  # Observed route-SET → at-crossing median across 10 days production data: 212s
  # (P25=150s, P75=331s). For MCB-CCTV the signaller must have lowered barriers
  # AND verified CCTV BEFORE setting the route — so barriers are confirmed down
  # ≥212s before train arrives at crossing (median).
  #
  # Old value (120s) appears to have been calibrated against a small observation
  # sample and underestimates real barrier-lowering lead time.
  #
  # 180s is a moderate compromise — between P25 (150s) and the median (212s).
  # Higher = earlier warning + more accurate predicted_change time, but greater
  # risk of false positives when route never gets set (e.g. cancelled trains).
  pre_closure_secs: 180
  
  # How long after the train clears does it take for barriers to raise?
  # Observed: consistently 14-15s from last train to barriers rising
  # (crossing_clearance + post_clearance = ~15s total)
  post_clearance_secs: 5

  # How long it takes a train to physically clear the crossing zone
  # At 70mph a 200m train clears in ~6s; allow margin for slower trains
  # Observed total (clearance + post) = 14-15s across 4 windows
  crossing_clearance_secs: 10

  # Minimum warning time per regulations (GK/RT0192)
  min_warning_secs: 27

  # If no TD/TRUST data for this long, mark state as STALE
  stale_threshold_secs: 300

  # Cap for "barriers down" inferences from routes alone (no trains in our zone).
  # If routes have been SET this long without train activity, downgrade to UNKNOWN.
  # Stuck routes (240s lock-after-cancel, signal failure, etc.) shouldn't keep us
  # locked in CLOSED indefinitely. 15 min comfortably exceeds normal closure (5-8 min).
  max_route_hold_secs: 900

# TRUST timing points near the crossing (for fallback when TD unavailable)
# Offsets calibrated against SMART berth-step data (BPLAN, via vaildata.uk):
#   Eastbound: ANG departure → step 0038→0036 has BERTHOFFSET=-56 (step 56s after event)
#              0036 is the at-crossing berth, so departure → at-crossing = 56s
#   Westbound: GBS departure → step 0035→0037 has BERTHOFFSET=-17 (step 17s after event)
#              0037 is strike-in; observed median 0037→0041 (at-crossing) is 104s
#              So departure → at-crossing ≈ 17 + 104 = 121s
trust:
  timing_points:
    # Departure events — used for crossing time estimation
    - tiploc: "ANGMRNG"
      stanox: "87998"
      direction: "up"
      event: "departure"
      action: "predict"
      offset_secs: 56     # SMART: 0038→0036 step is 56s after Angmering UP departure event
    - tiploc: "GORNGBS"
      stanox: "87997"
      direction: "down"
      event: "departure"
      action: "predict"
      offset_secs: 121    # SMART (17s) + observed 0037→0041 (104s) = 121s

    # Arrival events — used to show trains at stations
    - tiploc: "ANGMRNG"
      stanox: "87998"
      direction: "up"
      event: "arrival"
      action: "at_station"
      station: "Angmering"
    - tiploc: "ANGMRNG"
      stanox: "87998"
      direction: "down"
      event: "arrival"
      action: "clear"       # Westbound arrival at Angmering P2 = past the crossing
      station: "Angmering"
    - tiploc: "GORNGBS"
      stanox: "87997"
      direction: "up"
      event: "arrival"
      action: "clear"            # Eastbound arrival at Goring = past the crossing
      station: "Goring"
    - tiploc: "GORNGBS"
      stanox: "87997"
      direction: "down"
      event: "arrival"
      action: "at_station"
      station: "Goring"

# Station berths — berths that straddle a station platform
# Each maps to a station name + sub-positions (% from left on diagram)
station_berths:
  "0038":
    station: "Angmering"
    direction: "up"
    entry: 8       # west side (train enters from west)
    platform: 17   # at station
  "0041":
    station: "Angmering"
    direction: "down"
    entry: 25      # east side (train enters from crossing)
    platform: 17   # at station
  "0032":
    station: "Goring"
    direction: "up"
    entry: 75      # west side (train enters from west)
    platform: 83   # at station
  "0035":
    station: "Goring"
    direction: "down"
    entry: 93      # east side (train enters from east)
    platform: 83   # at station

# S-Class route monitoring — LA route bits near the crossing
# Route SET implies barriers are down (MCB-CCTV: signaller lowers barriers before setting route)
# Validated: 98.8% coverage across 660 crossings over 9 days
# Bit numbering: 0 = LSB (bit 0 of the byte), 7 = MSB
routes:
  crossing_routes:
    # East side routes (signals east of crossing, berths 0032-0035)
    - { address: "02", bit: 6, name: "R27", side: "east" }
    - { address: "02", bit: 7, name: "R28", side: "east" }
    - { address: "03", bit: 0, name: "R29", side: "east" }
    - { address: "03", bit: 7, name: "R31", side: "east" }
    - { address: "04", bit: 0, name: "R31b", side: "east" }
    - { address: "04", bit: 2, name: "R32", side: "east" }
    - { address: "04", bit: 3, name: "R33", side: "east" }
    - { address: "04", bit: 4, name: "R34", side: "east" }
    - { address: "04", bit: 5, name: "R34b", side: "east" }
    - { address: "04", bit: 6, name: "R35", side: "east" }
    # West side routes (signals west of crossing, A-prefix berths)
    - { address: "05", bit: 1, name: "RA007", side: "west" }
    - { address: "05", bit: 2, name: "RA008", side: "west" }
    - { address: "03", bit: 4, name: "RA010", side: "west" }
    - { address: "03", bit: 5, name: "RA010b", side: "west" }

# Realtime Trains API — platform-level station data
rtt:
  stations: ["ANG", "GBS"]    # CRS codes to poll (ANG=Angmering, GBS=Goring-by-Sea)
  poll_interval: 15            # seconds between poll cycles

# API server
api:
  host: "127.0.0.1"    # Use 0.0.0.0 for LAN access
  port: 8590
